<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Weather App</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        #map {
            height: 300px;
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">🌤 Weather App</h2>

        <div id="weather" class="text-center">
            <p>Loading location and weather...</p>
        </div>

        <div id="map" class="mt-4"></div>
    </div>
</div>

<script>
const apiKey = "59515b6c56df02c501d971623d90bd57";

function getWindDirection(deg) {
    const directions = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
    return directions[Math.round(deg / 45) % 8];
}

function initMap(lat, lon) {
    const location = { lat: lat, lng: lon };
    const map = new google.maps.Map(document.getElementById("map"), {
        zoom: 10,
        center: location,
    });

    new google.maps.Marker({
        position: location,
        map: map,
    });
}

function getWeather(lat, lon) {
    const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${apiKey}`;

    fetch(url)
        .then(res => res.json())
        .then(data => {
            const temp = data.main.temp;
            const description = data.weather[0].description;
            const windSpeed = data.wind.speed;
            const windDir = getWindDirection(data.wind.deg);

            document.getElementById("weather").innerHTML = `
                <h4>${data.name}</h4>
                <p><strong>Temperature:</strong> ${temp} °C</p>
                <p><strong>Weather:</strong> ${description}</p>
                <p><strong>Wind:</strong> ${windSpeed} m/s (${windDir})</p>
            `;
        })
        .catch(() => {
            document.getElementById("weather").innerHTML = "Failed to load weather data :(";
        });
}

if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
        position => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            getWeather(lat, lon);
            initMap(lat, lon);
        },
        () => {
            document.getElementById("weather").innerHTML = "Location access denied.";
        }
    );
} else {
    document.getElementById("weather").innerHTML = "Geolocation not supported.";
}



</script>

<!-- Google Maps API (replace YOUR_GOOGLE_MAPS_API_KEY) -->
<script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDiPfpONSMdU1XMRwU37k0qE3EgFkp7KlE&callback=initMap">
</script>

</body>
</html>
